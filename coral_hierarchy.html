<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coral Species Interaction Hierarchy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a1628;
  color: #c8dce8;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

.page-header {
  text-align: center;
  padding: 40px 20px 10px;
}

.page-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 2.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #e0ecf4;
  text-shadow: 0 0 40px rgba(56,189,248,0.15);
}

.page-header .subtitle {
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  color: #6b8da8;
  margin-top: 6px;
}

/* Tabs */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 20px 20px 0;
  flex-wrap: wrap;
}

.tab-btn {
  background: rgba(30,60,90,0.35);
  border: 1px solid rgba(56,189,248,0.12);
  color: #6b8da8;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.3s ease;
  border-radius: 6px;
}

.tab-btn:hover {
  background: rgba(30,80,120,0.5);
  color: #a8d0e8;
}

.tab-btn.active {
  background: linear-gradient(135deg, rgba(20,80,130,0.7), rgba(30,100,150,0.5));
  border-color: rgba(56,189,248,0.35);
  color: #e0ecf4;
  box-shadow: 0 0 20px rgba(56,189,248,0.1);
}

/* Legend */
.legend {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  color: #8aa8c0;
}

.legend-line {
  width: 50px;
  height: 2px;
  position: relative;
}

.legend-line.dominant {
  background: rgba(56,189,248,0.5);
}

.legend-line.dominant::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -4px;
  border: 5px solid transparent;
  border-left: 7px solid rgba(56,189,248,0.6);
}

.legend-line.mutual {
  background: transparent;
  border-top: 2px dashed rgba(248,113,113,0.6);
}

.legend-line.mutual::before {
  content: '';
  position: absolute;
  left: -1px;
  top: -4px;
  border: 5px solid transparent;
  border-right: 7px solid rgba(248,113,113,0.5);
}

.legend-line.mutual::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -4px;
  border: 5px solid transparent;
  border-left: 7px solid rgba(248,113,113,0.5);
}

/* Chart container */
.chart-container {
  display: none;
  position: relative;
  width: 100%;
  overflow-x: auto;
}

.chart-container.active {
  display: block;
}

.chart-svg {
  display: block;
  margin: 0 auto;
}

/* Tier labels */
.tier-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  fill: rgba(107,141,168,0.5);
}

/* Node styling */
.node-group { cursor: pointer; }

.node-circle {
  fill: rgba(20,70,110,0.7);
  stroke: rgba(56,189,248,0.35);
  stroke-width: 2.5;
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(56,189,248,0.1));
}

.node-group:hover .node-circle,
.node-group.highlighted .node-circle {
  fill: rgba(30,90,140,0.85);
  stroke: rgba(56,189,248,0.7);
  stroke-width: 3;
  filter: drop-shadow(0 0 18px rgba(56,189,248,0.3));
}

.node-group.dimmed .node-circle {
  fill: rgba(20,50,80,0.3);
  stroke: rgba(56,189,248,0.1);
  filter: none;
}

.node-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 14px;
  fill: #c8dce8;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  transition: fill 0.3s ease;
}

.node-group.dimmed .node-label {
  fill: rgba(107,141,168,0.3);
}

.win-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  fill: #e0ecf4;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

.win-badge-bg {
  fill: rgba(20,100,160,0.8);
  stroke: rgba(56,189,248,0.4);
  stroke-width: 1.5;
}

/* Edges */
.edge-dominant {
  stroke: rgba(56,189,248,0.25);
  stroke-width: 1.5;
  fill: none;
  marker-end: url(#arrowDominant);
  transition: all 0.3s ease;
}

.edge-dominant.highlighted {
  stroke: rgba(56,189,248,0.7);
  stroke-width: 2.5;
}

.edge-dominant.dimmed {
  stroke: rgba(56,189,248,0.06);
  stroke-width: 1;
}

.edge-mutual {
  stroke: rgba(248,113,113,0.35);
  stroke-width: 1.5;
  fill: none;
  stroke-dasharray: 8 5;
  marker-start: url(#arrowMutualStart);
  marker-end: url(#arrowMutualEnd);
  transition: all 0.3s ease;
}

.edge-mutual.highlighted {
  stroke: rgba(248,113,113,0.75);
  stroke-width: 2.5;
}

.edge-mutual.dimmed {
  stroke: rgba(248,113,113,0.06);
  stroke-width: 1;
}

.edge-count {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  fill: rgba(56,189,248,0.5);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

.edge-count.mutual-count {
  fill: rgba(248,113,113,0.5);
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: rgba(10,30,55,0.95);
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: 8px;
  padding: 14px 18px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  z-index: 1000;
  max-width: 320px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.tooltip.visible { opacity: 1; }

.tooltip-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 1.15rem;
  color: #e0ecf4;
  margin-bottom: 4px;
}

.tooltip-score {
  font-size: 0.78rem;
  color: #6b8da8;
  margin-bottom: 10px;
}

.tooltip-section {
  margin-bottom: 6px;
}

.tooltip-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.tooltip-section-title.beats { color: #38bdf8; }
.tooltip-section-title.lost { color: #f87171; }
.tooltip-section-title.mutual { color: #fbbf24; }

.tooltip-section-list {
  font-size: 0.78rem;
  color: #a8c4d8;
  line-height: 1.5;
}

.tooltip-section-list span {
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
}

/* Tier dividers */
.tier-divider {
  stroke: rgba(107,141,168,0.12);
  stroke-width: 1;
  stroke-dasharray: 6 6;
}
</style>
</head>
<body>

<div class="page-header">
  <h1>Coral Species Interaction Hierarchy</h1>
  <div class="subtitle">Gulf of Aqaba · Red Sea · May 2026</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('snorkel')">Snorkel Data</button>
  <button class="tab-btn" onclick="switchTab('dive')">Dive Data</button>

</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-line dominant"></div>

  <div class="legend-item">

<div id="chart-snorkel" class="chart-container active"></div>
<div id="chart-dive" class="chart-container"></div>
<div id="chart-combined" class="chart-container"></div>

<div class="tooltip" id="tooltip"></div>

<script>
const DATASETS = {
  snorkel: {"Favites":{"name":"Favites","wins":6,"losses":5,"total":12,"beats":{"Goniastrea":3,"Hydnophora":1,"Millepora":1,"Porites":1},"lost_to":{"Dipsastrea":1,"Goniastrea":2,"Platygyra":1,"Stylophora":1},"mutuals":{"Platygyra":1}},"Goniastrea":{"name":"Goniastrea","wins":4,"losses":6,"total":10,"beats":{"Favites":2,"Platygyra":1,"Porites":1},"lost_to":{"Dipsastrea":1,"Pocillopora":1,"Favites":3,"Porites":1},"mutuals":{}},"Dipsastrea":{"name":"Dipsastrea","wins":4,"losses":0,"total":5,"beats":{"Platygyra":1,"Goniastrea":1,"Cyphastrea":1,"Favites":1},"lost_to":{},"mutuals":{"Astreopora":1}},"Platygyra":{"name":"Platygyra","wins":2,"losses":2,"total":5,"beats":{"Pocillopora":1,"Favites":1},"lost_to":{"Dipsastrea":1,"Goniastrea":1},"mutuals":{"Favites":1}},"Stylophora":{"name":"Stylophora","wins":1,"losses":0,"total":1,"beats":{"Favites":1},"lost_to":{},"mutuals":{}},"Pocillopora":{"name":"Pocillopora","wins":1,"losses":1,"total":2,"beats":{"Goniastrea":1},"lost_to":{"Platygyra":1},"mutuals":{}},"Astreopora":{"name":"Astreopora","wins":1,"losses":0,"total":2,"beats":{"Porites":1},"lost_to":{},"mutuals":{"Dipsastrea":1}},"Porites":{"name":"Porites","wins":1,"losses":3,"total":4,"beats":{"Goniastrea":1},"lost_to":{"Favites":1,"Goniastrea":1,"Astreopora":1},"mutuals":{}},"Millepora":{"name":"Millepora","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Favites":1},"mutuals":{}},"Hydnophora":{"name":"Hydnophora","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Favites":1},"mutuals":{}},"Cyphastrea":{"name":"Cyphastrea","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Dipsastrea":1},"mutuals":{}}},

  dive: {"Millepora":{"name":"Millepora","wins":15,"losses":0,"total":15,"beats":{"Platygyra":1,"Favites":6,"Stylophora":2,"Cyphastrea":2,"Goniastrea":2,"Lobophyllia":1,"Dipsastrea":1},"lost_to":{},"mutuals":{}},"Favites":{"name":"Favites","wins":7,"losses":9,"total":16,"beats":{"Goniastrea":2,"Dipsastrea":1,"Acropora":1,"Cyphastrea":3},"lost_to":{"Millepora":6,"Cyphastrea":1,"Acropora":1,"Pocillopora":1},"mutuals":{}},"Dipsastrea":{"name":"Dipsastrea","wins":5,"losses":6,"total":11,"beats":{"Cyphastrea":1,"Stylophora":1,"Acropora":1,"Pocillopora":1,"Goniastrea":1},"lost_to":{"Millepora":1,"Favites":1,"Sarcophyton":1,"Cyphastrea":1,"Sinularia":1,"Lobophyllia":1},"mutuals":{}},"Acropora":{"name":"Acropora","wins":3,"losses":3,"total":6,"beats":{"Cyphastrea":1,"Turbinaria":1,"Favites":1},"lost_to":{"Favites":1,"Dipsastrea":1,"Xenia":1},"mutuals":{}},"Stylophora":{"name":"Stylophora","wins":2,"losses":5,"total":7,"beats":{"Cyphastrea":1,"Goniastrea":1},"lost_to":{"Goniastrea":1,"Millepora":2,"Dipsastrea":1,"Lobophyllia":1},"mutuals":{}},"Pocillopora":{"name":"Pocillopora","wins":2,"losses":2,"total":4,"beats":{"Favites":1,"Cyphastrea":1},"lost_to":{"Goniastrea":1,"Dipsastrea":1},"mutuals":{}},"Lobophyllia":{"name":"Lobophyllia","wins":2,"losses":1,"total":3,"beats":{"Dipsastrea":1,"Stylophora":1},"lost_to":{"Millepora":1},"mutuals":{}},"Cyphastrea":{"name":"Cyphastrea","wins":2,"losses":9,"total":11,"beats":{"Dipsastrea":1,"Favites":1},"lost_to":{"Millepora":2,"Favites":3,"Dipsastrea":1,"Stylophora":1,"Acropora":1,"Pocillopora":1},"mutuals":{}},"Goniastrea":{"name":"Goniastrea","wins":2,"losses":6,"total":8,"beats":{"Pocillopora":1,"Stylophora":1},"lost_to":{"Millepora":2,"Favites":2,"Dipsastrea":1,"Stylophora":1},"mutuals":{}},"Xenia":{"name":"Xenia","wins":1,"losses":0,"total":1,"beats":{"Acropora":1},"lost_to":{},"mutuals":{}},"Sinularia":{"name":"Sinularia","wins":1,"losses":0,"total":1,"beats":{"Dipsastrea":1},"lost_to":{},"mutuals":{}},"Sarcophyton":{"name":"Sarcophyton","wins":1,"losses":0,"total":1,"beats":{"Dipsastrea":1},"lost_to":{},"mutuals":{}},"Turbinaria":{"name":"Turbinaria","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Acropora":1},"mutuals":{}},"Platygyra":{"name":"Platygyra","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Millepora":1},"mutuals":{}}},

  combined: {"Millepora":{"name":"Millepora","wins":15,"losses":1,"total":16,"beats":{"Platygyra":1,"Favites":6,"Stylophora":2,"Cyphastrea":2,"Goniastrea":2,"Lobophyllia":1,"Dipsastrea":1},"lost_to":{"Favites":1},"mutuals":{}},"Favites":{"name":"Favites","wins":13,"losses":14,"total":28,"beats":{"Goniastrea":5,"Dipsastrea":1,"Acropora":1,"Cyphastrea":3,"Hydnophora":1,"Millepora":1,"Porites":1},"lost_to":{"Goniastrea":2,"Millepora":6,"Dipsastrea":1,"Cyphastrea":1,"Stylophora":1,"Acropora":1,"Pocillopora":1,"Platygyra":1},"mutuals":{"Platygyra":1}},"Dipsastrea":{"name":"Dipsastrea","wins":9,"losses":6,"total":16,"beats":{"Cyphastrea":2,"Stylophora":1,"Acropora":1,"Pocillopora":1,"Goniastrea":2,"Platygyra":1,"Favites":1},"lost_to":{"Millepora":1,"Favites":1,"Sarcophyton":1,"Cyphastrea":1,"Sinularia":1,"Lobophyllia":1},"mutuals":{"Astreopora":1}},"Goniastrea":{"name":"Goniastrea","wins":6,"losses":12,"total":18,"beats":{"Pocillopora":1,"Stylophora":1,"Favites":2,"Platygyra":1,"Porites":1},"lost_to":{"Millepora":2,"Favites":5,"Dipsastrea":2,"Stylophora":1,"Pocillopora":1,"Porites":1},"mutuals":{}},"Stylophora":{"name":"Stylophora","wins":3,"losses":5,"total":8,"beats":{"Cyphastrea":1,"Goniastrea":1,"Favites":1},"lost_to":{"Goniastrea":1,"Millepora":2,"Dipsastrea":1,"Lobophyllia":1},"mutuals":{}},"Pocillopora":{"name":"Pocillopora","wins":3,"losses":3,"total":6,"beats":{"Favites":1,"Cyphastrea":1,"Goniastrea":1},"lost_to":{"Goniastrea":1,"Dipsastrea":1,"Platygyra":1},"mutuals":{}},"Acropora":{"name":"Acropora","wins":3,"losses":3,"total":6,"beats":{"Cyphastrea":1,"Turbinaria":1,"Favites":1},"lost_to":{"Favites":1,"Dipsastrea":1,"Xenia":1},"mutuals":{}},"Lobophyllia":{"name":"Lobophyllia","wins":2,"losses":1,"total":3,"beats":{"Dipsastrea":1,"Stylophora":1},"lost_to":{"Millepora":1},"mutuals":{}},"Cyphastrea":{"name":"Cyphastrea","wins":2,"losses":10,"total":12,"beats":{"Dipsastrea":1,"Favites":1},"lost_to":{"Millepora":2,"Favites":3,"Dipsastrea":2,"Stylophora":1,"Acropora":1,"Pocillopora":1},"mutuals":{}},"Platygyra":{"name":"Platygyra","wins":2,"losses":3,"total":6,"beats":{"Pocillopora":1,"Favites":1},"lost_to":{"Goniastrea":1,"Millepora":1,"Dipsastrea":1},"mutuals":{"Favites":1}},"Xenia":{"name":"Xenia","wins":1,"losses":0,"total":1,"beats":{"Acropora":1},"lost_to":{},"mutuals":{}},"Sinularia":{"name":"Sinularia","wins":1,"losses":0,"total":1,"beats":{"Dipsastrea":1},"lost_to":{},"mutuals":{}},"Astreopora":{"name":"Astreopora","wins":1,"losses":0,"total":2,"beats":{"Porites":1},"lost_to":{},"mutuals":{"Dipsastrea":1}},"Sarcophyton":{"name":"Sarcophyton","wins":1,"losses":0,"total":1,"beats":{"Dipsastrea":1},"lost_to":{},"mutuals":{}},"Porites":{"name":"Porites","wins":1,"losses":3,"total":4,"beats":{"Goniastrea":1},"lost_to":{"Goniastrea":1,"Favites":1,"Astreopora":1},"mutuals":{}},"Turbinaria":{"name":"Turbinaria","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Acropora":1},"mutuals":{}},"Hydnophora":{"name":"Hydnophora","wins":0,"losses":1,"total":1,"beats":{},"lost_to":{"Favites":1},"mutuals":{}}}
};

const tooltip = document.getElementById('tooltip');
let currentTab = 'snorkel';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['snorkel','dive','combined'][i] === tab);
  });
  document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('active'));
  document.getElementById('chart-' + tab).classList.add('active');
  renderChart(tab);
}

function assignTiers(data) {
  const species = Object.values(data).sort((a, b) => b.wins - a.wins || a.total - b.total);
  if (species.length === 0) return { tiers: [], tierLabels: [] };

  const maxWins = species[0].wins;
  const minWins = species[species.length - 1].wins;
  const range = maxWins - minWins || 1;

  const tiers = [[], [], []]; // top, mid, bottom
  const tierLabels = ['Tier I — Dominant', 'Tier II — Strong', 'Tier III — Moderate'];

  species.forEach(sp => {
    const ratio = (sp.wins - minWins) / range;
    if (ratio >= 0.6) tiers[0].push(sp);
    else if (ratio >= 0.2) tiers[1].push(sp);
    else tiers[2].push(sp);
  });

  // Ensure no empty tiers — redistribute
  if (tiers[0].length === 0 && species.length > 0) {
    tiers[0].push(tiers[1].shift() || tiers[2].shift());
  }
  if (tiers[1].length === 0 && tiers[2].length > 1) {
    const half = Math.ceil(tiers[2].length / 2);
    tiers[1] = tiers[2].splice(0, half);
  }

  return { tiers, tierLabels };
}

function renderChart(tab) {
  const data = DATASETS[tab];
  const container = document.getElementById('chart-' + tab);
  const { tiers, tierLabels } = assignTiers(data);

  const nodeRadius = 48;
  const tierYs = [120, 310, 520];
  const svgWidth = Math.max(960, ...tiers.map(t => t.length * 160 + 100));
  const svgHeight = 660;
  const nodePositions = {};

  // Lay out nodes per tier
  tiers.forEach((tier, ti) => {
    const y = tierYs[ti];
    const totalW = tier.length * 140;
    const startX = (svgWidth - totalW) / 2 + 70;
    tier.forEach((sp, si) => {
      nodePositions[sp.name] = {
        x: startX + si * 140,
        y: y,
        ...sp
      };
    });
  });

  // Collect edges
  const dominantEdges = [];
  const mutualEdges = [];
  const seenMutuals = new Set();

  Object.values(data).forEach(sp => {
    Object.entries(sp.beats).forEach(([loser, count]) => {
      if (nodePositions[loser]) {
        dominantEdges.push({ from: sp.name, to: loser, count });
      }
    });
    Object.entries(sp.mutuals).forEach(([other, count]) => {
      const key = [sp.name, other].sort().join('|');
      if (!seenMutuals.has(key) && nodePositions[other]) {
        seenMutuals.add(key);
        mutualEdges.push({ a: sp.name, b: other, count });
      }
    });
  });

  // Build SVG
  let svg = `<svg class="chart-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" width="${svgWidth}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowDominant-${tab}" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(56,189,248,0.5)"/>
    </marker>
    <marker id="arrowMutualEnd-${tab}" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(248,113,113,0.5)"/>
    </marker>
    <marker id="arrowMutualStart-${tab}" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="rgba(248,113,113,0.5)"/>
    </marker>
    <filter id="glow-${tab}">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // Tier dividers & labels
  const dividerYs = [215, 415];
  dividerYs.forEach((dy, i) => {
    svg += `<line class="tier-divider" x1="30" y1="${dy}" x2="${svgWidth - 30}" y2="${dy}"/>`;
  });
  tierLabels.forEach((label, i) => {
    svg += `<text class="tier-label" x="35" y="${tierYs[i] - 48}">${label}</text>`;
  });

  // Draw edges (dominant)
  dominantEdges.forEach((e, i) => {
    const from = nodePositions[e.from];
    const to = nodePositions[e.to];
    if (!from || !to) return;
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / dist, uy = dy / dist;
    const sx = from.x + ux * (nodeRadius + 4);
    const sy = from.y + uy * (nodeRadius + 4);
    const ex = to.x - ux * (nodeRadius + 10);
    const ey = to.y - uy * (nodeRadius + 10);
    // Curve offset
    const cx = (sx + ex) / 2 - (ey - sy) * 0.15;
    const cy = (sy + ey) / 2 + (ex - sx) * 0.15;
    svg += `<path class="edge-dominant" data-from="${e.from}" data-to="${e.to}"
      d="M${sx},${sy} Q${cx},${cy} ${ex},${ey}"
      style="marker-end:url(#arrowDominant-${tab})"/>`;
    if (e.count > 1) {
      const lx = cx * 0.5 + (sx+ex)*0.25;
      const ly = cy * 0.5 + (sy+ey)*0.25;
      svg += `<text class="edge-count" x="${(sx+ex)/2 - (ey-sy)*0.08}" y="${(sy+ey)/2 + (ex-sx)*0.08}">${e.count}×</text>`;
    }
  });

  // Draw edges (mutual)
  mutualEdges.forEach((e, i) => {
    const a = nodePositions[e.a];
    const b = nodePositions[e.b];
    if (!a || !b) return;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / dist, uy = dy / dist;
    const sx = a.x + ux * (nodeRadius + 8);
    const sy = a.y + uy * (nodeRadius + 8);
    const ex = b.x - ux * (nodeRadius + 8);
    const ey = b.y - uy * (nodeRadius + 8);
    const cx = (sx + ex) / 2 + (ey - sy) * 0.2;
    const cy = (sy + ey) / 2 - (ex - sx) * 0.2;
    svg += `<path class="edge-mutual" data-a="${e.a}" data-b="${e.b}"
      d="M${sx},${sy} Q${cx},${cy} ${ex},${ey}"
      style="marker-start:url(#arrowMutualStart-${tab});marker-end:url(#arrowMutualEnd-${tab})"/>`;
    if (e.count > 1) {
      svg += `<text class="edge-count mutual-count" x="${(sx+ex)/2 + (ey-sy)*0.1}" y="${(sy+ey)/2 - (ex-sx)*0.1}">${e.count}×</text>`;
    }
  });

  // Draw nodes
  Object.values(nodePositions).forEach(sp => {
    svg += `<g class="node-group" data-name="${sp.name}"
      onmouseenter="highlightNode('${tab}','${sp.name}')"
      onmouseleave="clearHighlight('${tab}')"
      onmousemove="moveTooltip(event)">
      <circle class="node-circle" cx="${sp.x}" cy="${sp.y}" r="${nodeRadius}"/>
      <text class="node-label" x="${sp.x}" y="${sp.y}">${sp.name}</text>
      <circle class="win-badge-bg" cx="${sp.x + nodeRadius * 0.65}" cy="${sp.y - nodeRadius * 0.65}" r="13"/>
      <text class="win-badge" x="${sp.x + nodeRadius * 0.65}" y="${sp.y - nodeRadius * 0.65}">${sp.wins}</text>
    </g>`;
  });

  svg += '</svg>';
  container.innerHTML = svg;
}

function highlightNode(tab, name) {
  const data = DATASETS[tab];
  const sp = data[name];
  if (!sp) return;

  const container = document.getElementById('chart-' + tab);

  // Connected species
  const connected = new Set([name]);
  Object.keys(sp.beats).forEach(n => connected.add(n));
  Object.keys(sp.lost_to).forEach(n => connected.add(n));
  Object.keys(sp.mutuals).forEach(n => connected.add(n));

  // Dim/highlight nodes
  container.querySelectorAll('.node-group').forEach(g => {
    const n = g.getAttribute('data-name');
    g.classList.toggle('highlighted', n === name);
    g.classList.toggle('dimmed', !connected.has(n));
  });

  // Dim/highlight edges
  container.querySelectorAll('.edge-dominant').forEach(e => {
    const f = e.getAttribute('data-from'), t = e.getAttribute('data-to');
    const relevant = f === name || t === name;
    e.classList.toggle('highlighted', relevant);
    e.classList.toggle('dimmed', !relevant);
  });
  container.querySelectorAll('.edge-mutual').forEach(e => {
    const a = e.getAttribute('data-a'), b = e.getAttribute('data-b');
    const relevant = a === name || b === name;
    e.classList.toggle('highlighted', relevant);
    e.classList.toggle('dimmed', !relevant);
  });

  // Build tooltip
  let html = `<div class="tooltip-name">${name}</div>`;
  html += `<div class="tooltip-score">Win score: ${sp.wins} · Loss score: ${sp.losses}</div>`;

  if (Object.keys(sp.beats).length > 0) {
    html += `<div class="tooltip-section"><div class="tooltip-section-title beats">Beats:</div>`;
    html += `<div class="tooltip-section-list">` +
      Object.entries(sp.beats).map(([n,c]) => `→ <span>${n}</span> (${c}×)`).join(', ') +
      `</div></div>`;
  }

  if (Object.keys(sp.lost_to).length > 0) {
    html += `<div class="tooltip-section"><div class="tooltip-section-title lost">Lost to:</div>`;
    html += `<div class="tooltip-section-list">` +
      Object.entries(sp.lost_to).map(([n,c]) => `← <span>${n}</span> (${c}×)`).join(', ') +
      `</div></div>`;
  }

  if (Object.keys(sp.mutuals).length > 0) {
    html += `<div class="tooltip-section"><div class="tooltip-section-title mutual">Mutual aggression:</div>`;
    html += `<div class="tooltip-section-list">` +
      Object.entries(sp.mutuals).map(([n,c]) => `↔ <span>${n}</span> (${c}×)`).join(', ') +
      `</div></div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
}

function clearHighlight(tab) {
  const container = document.getElementById('chart-' + tab);
  container.querySelectorAll('.node-group').forEach(g => {
    g.classList.remove('highlighted', 'dimmed');
  });
  container.querySelectorAll('.edge-dominant, .edge-mutual').forEach(e => {
    e.classList.remove('highlighted', 'dimmed');
  });
  tooltip.classList.remove('visible');
}

function moveTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 16 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 10 : y) + 'px';
}

// Initial render
renderChart('snorkel');
</script>
